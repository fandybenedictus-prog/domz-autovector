{% extends 'core/base.html' %}
{% block title %}Masuk{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md">

        <div class="text-center mb-8">
            <div class="text-5xl mb-4">🔐</div>
            <h1 class="text-2xl font-bold mb-2">Selamat Datang Kembali</h1>
            <p class="text-gray-400 text-sm">Masuk untuk melanjutkan konversi Anda</p>
        </div>

        <div class="glass rounded-2xl p-8 border border-white/10">
            <form method="post" novalidate>
                {% csrf_token %}

                <div class="mb-5">
                    <label class="block text-sm font-medium text-gray-300 mb-1.5" for="username">Username</label>
                    <input type="text" id="username" name="username" required autocomplete="username"
                        placeholder="masukkan username" class="w-full px-4 py-2.5 rounded-lg bg-gray-800 border border-gray-600 text-white placeholder-gray-500
                   focus:outline-none focus:border-indigo-500 transition" />
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-300 mb-1.5" for="password">Password</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password"
                        placeholder="masukkan password" class="w-full px-4 py-2.5 rounded-lg bg-gray-800 border border-gray-600 text-white placeholder-gray-500
                   focus:outline-none focus:border-indigo-500 transition" />
                </div>

                <button type="submit"
                    class="w-full py-3 rounded-xl bg-indigo-600 hover:bg-indigo-500 font-bold text-base transition btn-glow">
                    Masuk →
                </button>
            </form>

            <p class="text-center text-sm text-gray-400 mt-6">
                Belum punya akun?
                <a href="{% url 'register' %}" class="text-indigo-400 hover:text-indigo-300 font-semibold">Daftar
                    gratis</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
